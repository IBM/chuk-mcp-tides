services:
  tides:
    build: .
    ports:
      - "8003:8003"
    environment:
      - TIDES_DEFAULT_PROVIDER=noaa
      - TIDES_CACHE_TTL=3600
      - ARTIFACTS_PROVIDER=memory
    restart: unless-stopped

